version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pipeline_registry_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pipeline_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - registry_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pipeline_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  registry_data:
    driver: local